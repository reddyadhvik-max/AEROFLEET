version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: aerofleet_db
    restart: always
    environment:
      POSTGRES_USER: aerofleet_user
      POSTGRES_PASSWORD: aerofleet_password
      POSTGRES_DB: aerofleet_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: aerofleet_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
